name: SonarCloud Coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  sonarcloud:
    name: Test and analyze with SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run condition coverage tests
        run: >
          npx jest backend/services/exam-service/src/tests/liveAnswerRules.conditionCoverage.test.js
          --runInBand
          --coverage
          --collectCoverageFrom=backend/services/exam-service/src/services/liveAnswerRules.js
          --coverageReporters=lcov
          --coverageReporters=text
          --no-color
          -t "test_c1"

      - name: Verify coverage report
        run: test -f coverage/lcov.info

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=jaqzo8
            -Dsonar.projectKey=JaqzO8_PAE_Completo
            -Dsonar.projectName=PAE_Completo
            -Dsonar.sources=backend/services/exam-service/src/services
            -Dsonar.tests=backend/services/exam-service/src/tests
            -Dsonar.test.inclusions=backend/services/exam-service/src/tests/**/*.test.js
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/uploads/**
