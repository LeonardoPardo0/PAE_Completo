name: SonarCloud analysis with coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # FRONTEND: React + Vite
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: apps/web
        run: npx vitest run --coverage --coverage.reporter=lcov

      # BACKEND: FastAPI + Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run backend tests with coverage
        working-directory: services/api
        run: |
          pytest tests \
            --cov=app \
            --cov-branch \
            --cov-report=xml:coverage.xml

      - name: Verify coverage files
        run: |
          test -f apps/web/coverage/lcov.info
          test -f services/api/coverage.xml

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=JaqzO8_PAE_Completo
            -Dsonar.organization=jaqzo8
            -Dsonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info
            -Dsonar.python.coverage.reportPaths=services/api/coverage.xml
            -Dsonar.host.url=https://sonarcloud.io
